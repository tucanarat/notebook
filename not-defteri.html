<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Not Defteri">
<meta name="theme-color" content="#1a1a2e">
<title>Not Defteri</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0f0f1a;
    --bg2: #16162a;
    --bg3: #1e1e35;
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --text: #e8e6f0;
    --text2: #9590b0;
    --text3: #5c5878;
    --border: rgba(124,106,247,0.15);
    --border2: rgba(124,106,247,0.3);
    --danger: #f87171;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
  }

  /* ── VIEWS ── */
  .view { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .view.active { display: flex; }

  /* ── LIST VIEW ── */
  #list-view {}

  #list-header {
    padding: 20px 20px 12px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }

  #list-header h1 {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  #list-header .subtitle {
    font-size: 13px;
    color: var(--text3);
    margin-top: 2px;
  }

  #search-bar {
    margin: 12px 20px 0;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #search-bar svg { flex-shrink: 0; opacity: 0.4; }

  #search-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-size: 15px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
  }
  #search-input::placeholder { color: var(--text3); }

  #notes-container {
    flex: 1;
    overflow-y: auto;
    padding: 10px 16px 90px;
    -webkit-overflow-scrolling: touch;
  }

  .note-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform 0.12s, border-color 0.12s;
    position: relative;
    overflow: hidden;
  }

  .note-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
    background: var(--accent);
    border-radius: 2px 0 0 2px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .note-card:active { transform: scale(0.975); border-color: var(--border2); }

  .note-card .card-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }

  .note-card .card-snippet {
    font-size: 13px;
    color: var(--text2);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.5;
    margin-bottom: 8px;
  }

  .note-card .card-meta {
    font-size: 11px;
    color: var(--text3);
  }

  .empty-state {
    padding: 60px 20px;
    text-align: center;
    color: var(--text3);
  }

  .empty-state .icon {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.3;
  }

  .empty-state p { font-size: 14px; }

  /* FAB */
  #fab {
    position: fixed;
    bottom: calc(24px + var(--safe-bottom));
    right: 24px;
    width: 58px;
    height: 58px;
    background: var(--accent);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 24px rgba(124,106,247,0.5);
    cursor: pointer;
    border: none;
    transition: transform 0.12s, box-shadow 0.12s;
    z-index: 100;
  }
  #fab:active { transform: scale(0.92); box-shadow: 0 4px 12px rgba(124,106,247,0.4); }
  #fab svg { width: 26px; height: 26px; }

  /* ── EDITOR VIEW ── */
  #editor-view {}

  #editor-header {
    padding: 14px 16px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  #btn-back {
    width: 38px;
    height: 38px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.12s;
  }
  #btn-back:active { background: var(--border2); }

  #editor-meta {
    flex: 1;
    min-width: 0;
  }

  #editor-date {
    font-size: 11px;
    color: var(--text3);
  }

  #editor-word-count {
    font-size: 11px;
    color: var(--text3);
  }

  #btn-delete-note {
    width: 38px;
    height: 38px;
    background: transparent;
    border: none;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.12s;
    flex-shrink: 0;
  }
  #btn-delete-note:active { background: rgba(248,113,113,0.15); }

  #btn-save-indicator {
    font-size: 11px;
    color: var(--accent2);
    min-width: 60px;
    text-align: right;
  }

  #title-input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Fraunces', serif;
    font-size: 24px;
    font-weight: 600;
    color: var(--text);
    padding: 16px 20px 8px;
    caret-color: var(--accent2);
  }
  #title-input::placeholder { color: var(--text3); }

  #body-input {
    flex: 1;
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.8;
    color: var(--text2);
    padding: 4px 20px 20px;
    resize: none;
    caret-color: var(--accent2);
    -webkit-overflow-scrolling: touch;
    overflow-y: auto;
  }
  #body-input::placeholder { color: var(--text3); }

  /* ── MODAL ── */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  #modal-overlay.active { display: flex; }

  #modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    padding: 20px 20px calc(20px + var(--safe-bottom));
    width: 100%;
    max-width: 480px;
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  #modal h3 {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    margin-bottom: 8px;
    color: var(--text);
  }

  #modal p { font-size: 14px; color: var(--text2); margin-bottom: 20px; }

  .modal-btn {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 10px;
    transition: opacity 0.12s;
  }
  .modal-btn:active { opacity: 0.8; }
  .modal-btn.danger { background: var(--danger); color: #fff; }
  .modal-btn.cancel { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }

  /* ── INSTALL BANNER ── */
  #install-banner {
    display: none;
    position: fixed;
    bottom: calc(100px + var(--safe-bottom));
    left: 16px;
    right: 16px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 18px;
    padding: 14px 16px;
    z-index: 150;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  #install-banner p {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 10px;
    line-height: 1.5;
  }

  #install-banner p strong { color: var(--text); }

  .banner-btns { display: flex; gap: 8px; }

  .banner-btn {
    flex: 1;
    padding: 10px;
    border-radius: 12px;
    border: none;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
  }
  .banner-btn.primary { background: var(--accent); color: #fff; }
  .banner-btn.secondary { background: var(--bg2); color: var(--text2); border: 1px solid var(--border); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
</style>
</head>
<body>

<div id="app">

  <!-- LIST VIEW -->
  <div id="list-view" class="view active">
    <div id="list-header">
      <h1>Not Defteri</h1>
      <div class="subtitle" id="note-count-label">0 not</div>
      <div id="search-bar">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input id="search-input" type="search" placeholder="Notlarda ara..." autocomplete="off">
      </div>
    </div>
    <div id="notes-container"></div>
  </div>

  <!-- EDITOR VIEW -->
  <div id="editor-view" class="view">
    <div id="editor-header">
      <button id="btn-back">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path d="M19 12H5M5 12l7 7M5 12l7-7"/>
        </svg>
      </button>
      <div id="editor-meta">
        <div id="editor-date"></div>
        <div id="editor-word-count"></div>
      </div>
      <div id="btn-save-indicator"></div>
      <button id="btn-delete-note">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#f87171" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
        </svg>
      </button>
    </div>
    <input id="title-input" type="text" placeholder="Başlık...">
    <textarea id="body-input" placeholder="Notunu buraya yaz..."></textarea>
  </div>

</div>

<!-- FAB -->
<button id="fab">
  <svg fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2.5">
    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
  </svg>
</button>

<!-- DELETE MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <h3>Notu sil</h3>
    <p>Bu not kalıcı olarak silinecek. Emin misiniz?</p>
    <button class="modal-btn danger" id="confirm-delete">Evet, sil</button>
    <button class="modal-btn cancel" id="cancel-delete">Vazgeç</button>
  </div>
</div>

<!-- INSTALL BANNER -->
<div id="install-banner">
  <p><strong>Uygulamayı telefona ekle</strong><br>Tarayıcı menüsünden "Ana Ekrana Ekle" seçeneğini kullan.</p>
  <div class="banner-btns">
    <button class="banner-btn primary" id="btn-install">Tamam</button>
    <button class="banner-btn secondary" id="btn-dismiss-banner">Kapat</button>
  </div>
</div>

<script>
(function() {
  const STORAGE_KEY = 'notdefteri_v2';
  let notes = [];
  let activeId = null;
  let saveTimer = null;
  let deferredPrompt = null;

  try { notes = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) {}

  if (notes.length === 0) {
    notes = [
      { id: 'demo1', title: 'Hoş geldiniz!', body: 'Bu not defteri uygulamasını telefonunuza kurabilirsiniz.\n\nTarayıcı menüsünden "Ana Ekrana Ekle" seçeneğini kullanarak uygulamayı yükleyebilirsiniz.\n\nNotlarınız cihazınızda güvenle saklanır.', createdAt: Date.now()-200000, updatedAt: Date.now()-5000 },
      { id: 'demo2', title: 'Alışveriş', body: '• Süt\n• Ekmek\n• Yumurta\n• Domates\n• Soğan', createdAt: Date.now()-100000, updatedAt: Date.now()-80000 }
    ];
    persist();
  }

  function persist() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(notes)); } catch(e) {}
  }

  function formatDate(ts) {
    const d = new Date(ts), now = new Date();
    const diff = now - d;
    if (diff < 60000) return 'Az önce';
    if (diff < 3600000) return Math.floor(diff/60000) + ' dakika önce';
    if (diff < 86400000) return Math.floor(diff/3600000) + ' saat önce';
    if (diff < 604800000) return Math.floor(diff/86400000) + ' gün önce';
    return d.toLocaleDateString('tr-TR', { day:'numeric', month:'long' });
  }

  function wordCount(text) {
    return text.trim().split(/\s+/).filter(Boolean).length;
  }

  // Refs
  const notesContainer = document.getElementById('notes-container');
  const noteCountLabel = document.getElementById('note-count-label');
  const searchInput = document.getElementById('search-input');
  const listView = document.getElementById('list-view');
  const editorView = document.getElementById('editor-view');
  const titleInput = document.getElementById('title-input');
  const bodyInput = document.getElementById('body-input');
  const editorDate = document.getElementById('editor-date');
  const editorWordCount = document.getElementById('editor-word-count');
  const saveIndicator = document.getElementById('btn-save-indicator');
  const fab = document.getElementById('fab');
  const btnBack = document.getElementById('btn-back');
  const btnDelete = document.getElementById('btn-delete-note');
  const modalOverlay = document.getElementById('modal-overlay');
  const confirmDelete = document.getElementById('confirm-delete');
  const cancelDelete = document.getElementById('cancel-delete');

  function showView(view) {
    listView.classList.toggle('active', view === 'list');
    editorView.classList.toggle('active', view === 'editor');
    fab.style.display = view === 'list' ? 'flex' : 'none';
  }

  function renderList() {
    const q = searchInput.value.toLowerCase();
    let filtered = q
      ? notes.filter(n => n.title.toLowerCase().includes(q) || n.body.toLowerCase().includes(q))
      : notes;
    const sorted = [...filtered].sort((a, b) => b.updatedAt - a.updatedAt);

    noteCountLabel.textContent = notes.length + ' not';
    notesContainer.innerHTML = '';

    if (sorted.length === 0) {
      notesContainer.innerHTML = `<div class="empty-state"><div class="icon">📝</div><p>${q ? 'Sonuç bulunamadı.' : 'Henüz not yok.<br>+ ile başla.'}</p></div>`;
      return;
    }

    sorted.forEach(n => {
      const div = document.createElement('div');
      div.className = 'note-card';
      const snippet = n.body.replace(/\n/g,' ').trim() || 'Boş not';
      div.innerHTML = `
        <div class="card-title">${escHtml(n.title || 'Başlıksız')}</div>
        <div class="card-snippet">${escHtml(snippet)}</div>
        <div class="card-meta">${formatDate(n.updatedAt)}</div>
      `;
      div.onclick = () => openNote(n.id);
      notesContainer.appendChild(div);
    });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function openNote(id) {
    activeId = id;
    const n = notes.find(x => x.id === id);
    titleInput.value = n.title;
    bodyInput.value = n.body;
    editorDate.textContent = formatDate(n.updatedAt);
    editorWordCount.textContent = wordCount(n.body) + ' kelime';
    saveIndicator.textContent = '';
    showView('editor');
    setTimeout(() => bodyInput.focus(), 100);
  }

  function newNote() {
    const n = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      title: '', body: '',
      createdAt: Date.now(), updatedAt: Date.now()
    };
    notes.unshift(n);
    persist();
    openNote(n.id);
  }

  function scheduleSave() {
    saveIndicator.textContent = '●';
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      const n = notes.find(x => x.id === activeId);
      if (!n) return;
      n.title = titleInput.value;
      n.body = bodyInput.value;
      n.updatedAt = Date.now();
      persist();
      editorDate.textContent = formatDate(n.updatedAt);
      editorWordCount.textContent = wordCount(n.body) + ' kelime';
      saveIndicator.textContent = '✓';
      setTimeout(() => { saveIndicator.textContent = ''; }, 1500);
    }, 800);
  }

  function goBack() {
    clearTimeout(saveTimer);
    const n = notes.find(x => x.id === activeId);
    if (n) {
      n.title = titleInput.value;
      n.body = bodyInput.value;
      n.updatedAt = Date.now();
      if (!n.title && !n.body) {
        notes = notes.filter(x => x.id !== activeId);
      }
      persist();
    }
    activeId = null;
    renderList();
    showView('list');
  }

  // Events
  fab.onclick = newNote;
  btnBack.onclick = goBack;
  titleInput.oninput = scheduleSave;
  bodyInput.oninput = scheduleSave;
  searchInput.oninput = renderList;

  btnDelete.onclick = () => { modalOverlay.classList.add('active'); };
  cancelDelete.onclick = () => { modalOverlay.classList.remove('active'); };
  confirmDelete.onclick = () => {
    notes = notes.filter(x => x.id !== activeId);
    persist();
    modalOverlay.classList.remove('active');
    activeId = null;
    renderList();
    showView('list');
  };
  modalOverlay.onclick = (e) => {
    if (e.target === modalOverlay) modalOverlay.classList.remove('active');
  };

  // Install prompt
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    const banner = document.getElementById('install-banner');
    if (!sessionStorage.getItem('banner_dismissed')) {
      banner.style.display = 'block';
    }
  });

  document.getElementById('btn-install').onclick = async () => {
    document.getElementById('install-banner').style.display = 'none';
    if (deferredPrompt) { deferredPrompt.prompt(); }
  };

  document.getElementById('btn-dismiss-banner').onclick = () => {
    document.getElementById('install-banner').style.display = 'none';
    sessionStorage.setItem('banner_dismissed', '1');
  };

  // iOS banner (no beforeinstallprompt)
  const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isInApp = window.navigator.standalone;
  if (isIos && !isInApp && !sessionStorage.getItem('banner_dismissed')) {
    setTimeout(() => {
      const banner = document.getElementById('install-banner');
      banner.querySelector('p').innerHTML = '<strong>Uygulamayı telefona ekle</strong><br>Safari\'de paylaş butonuna dokun, ardından "Ana Ekrana Ekle" seçeneğini seç.';
      banner.style.display = 'block';
    }, 1500);
  }

  // Back gesture
  window.addEventListener('popstate', () => {
    if (editorView.classList.contains('active')) goBack();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && editorView.classList.contains('active')) goBack();
  });

  renderList();
  showView('list');
})();
</script>

</body>
</html>
